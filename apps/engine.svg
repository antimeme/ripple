<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <g id="sparkle">
      <polygon fill="#eee" stroke="#aaa" stroke-width="2"
               points="0,-20 4,-4 20,0 4,4 0,20 -4,4 -20,0 -4,-4" />
    </g>
  </defs>
  <circle cx="100" cy="100" r="95" fill="#444"
          stroke="#222" stroke-width="3"/>
  <use href="#sparkle" x="55" y="45"
       transform="scale(0.8)" transform-origin="55 45" />
  <use href="#sparkle" x="165" y="85"
       transform="scale(0.45)" transform-origin="165 85" />
  <use href="#sparkle" x="125" y="155"
       transform="scale(0.8)" transform-origin="125 155" />

  <g transform="rotate(45, 100, 100)"><!-- rocket -->
    <ellipse cx="100" cy="110" rx="27" ry="60"
             fill="#aae" stroke="#777" stroke-width="1" />
    <polygon points="72,135 60,150 65,170 84,170 74,145"
             fill="#aae" stroke="#777" stroke-width="1"/>
    <polygon points="128,135 140,150 135,170 116,170 126,145"
             fill="#aae" stroke="#777" stroke-width="1"/>
    <circle cx="100" cy="100" r="6" fill="#ddd"
            stroke="#444" stroke-width="1.5"/><!-- window -->
  </g>
</svg>
